name: SalaatiSwiftUi
options:
  bundleIdPrefix: com.salaati
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES

targets:
  SalaatiSwiftUi:
    type: application
    platform: macOS
    sources:
      - path: SalaatiSwiftUi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salaati.app
        INFOPLIST_KEY_CFBundleDisplayName: Salaati
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        COMBINE_HIDPI_IMAGES: YES

schemes:
  SalaatiSwiftUi:
    build:
      targets:
        SalaatiSwiftUi: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
